<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PAL Leadership Weekly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#04300f; --green2:#0a4a21; --green-logo:#006018;
  --gold:#d8a848; --gold-lt:#ebc878; --cream:#f5f2e8; --ink:#10210f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Mulish',sans-serif;background:var(--green);color:var(--cream);
  -webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 60px}
h1,h2,h3,.disp{font-family:'Oswald',sans-serif;letter-spacing:.5px}
.logo{display:block;margin:22px auto 6px;width:230px;max-width:64%}
.tag{text-align:center;color:var(--gold);font-family:'Oswald';font-weight:600;
  letter-spacing:3px;text-transform:uppercase;font-size:13px;margin-bottom:18px}
.card{background:linear-gradient(160deg,var(--green2),var(--green));
  border:1px solid rgba(216,168,72,.35);border-radius:16px;padding:22px;margin:16px 0;
  box-shadow:0 10px 30px rgba(0,0,0,.25)}
.btn{display:block;width:100%;text-align:center;font-family:'Oswald';font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;padding:20px;border-radius:14px;border:none;
  cursor:pointer;font-size:18px;margin:14px 0;transition:transform .12s ease}
.btn:active{transform:scale(.98)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-out{background:transparent;color:var(--gold-lt);border:2px solid var(--gold)}
.gate-title{text-align:center;font-size:30px;font-weight:700;text-transform:uppercase;margin:30px 0 6px}
.gate-sub{text-align:center;color:rgba(245,242,232,.7);margin-bottom:20px;font-size:15px}
.lesson-banner{background:linear-gradient(160deg,var(--green2),var(--green));
  border:2px solid var(--gold);border-radius:16px;padding:24px 20px;text-align:center;margin:8px 0 18px}
.lesson-week{color:var(--gold);font-family:'Oswald';font-weight:600;letter-spacing:3px;font-size:14px}
.lesson-name{font-family:'Oswald';font-weight:700;font-size:46px;color:var(--gold-lt);
  text-transform:uppercase;line-height:1.05;margin:4px 0}
.lesson-take{font-style:italic;color:var(--cream);font-size:17px;margin-top:10px;opacity:.92}
.sect-label{font-family:'Oswald';font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);font-size:14px;margin:4px 0 10px;display:flex;align-items:center;gap:8px}
.video{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#000;border:1px solid rgba(216,168,72,.3)}
.video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.action-box{background:rgba(216,168,72,.12);border-left:4px solid var(--gold);
  border-radius:8px;padding:14px 16px;font-size:16px;line-height:1.5}
.missing{color:rgba(245,242,232,.55);font-size:14px;font-style:italic;padding:10px 0}
input[type=text],input[type=password]{width:100%;padding:14px;border-radius:10px;border:1px solid rgba(216,168,72,.4);
  background:rgba(255,255,255,.06);color:var(--cream);font-size:16px;font-family:'Mulish';margin:6px 0}
input::placeholder{color:rgba(245,242,232,.45)}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--gold);background:none;border:none;
  font-family:'Oswald';font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  font-size:13px;padding:18px 0 4px}
.pill{display:inline-block;background:rgba(216,168,72,.18);color:var(--gold-lt);border-radius:20px;
  padding:4px 12px;font-size:12px;font-family:'Oswald';letter-spacing:1px;text-transform:uppercase}
.row-links a{display:block;text-align:center;color:var(--gold-lt);text-decoration:none;border:1px solid rgba(216,168,72,.35);
  border-radius:12px;padding:14px;margin:10px 0;font-family:'Oswald';font-weight:600;letter-spacing:1px;text-transform:uppercase;font-size:15px}
.note{background:rgba(0,0,0,.25);border:1px dashed rgba(216,168,72,.4);border-radius:10px;padding:12px 14px;
  font-size:13px;color:rgba(245,242,232,.75);margin:14px 0}
.ok{color:#7fd18c;font-weight:700;text-align:center;padding:14px;font-size:17px}
.err{color:#f0a3a3;text-align:center;padding:8px;font-size:14px}
.docrow{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(255,255,255,.05);border-radius:10px;padding:14px;margin:8px 0;font-size:15px;cursor:pointer}
.docrow .dl{color:var(--gold);font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:1px}
a.docrow{text-decoration:none;color:var(--cream)}
.time-btns{display:flex;gap:8px;margin:10px 0}
.time-btn{flex:1;padding:12px 8px;border-radius:10px;border:2px solid var(--gold);background:transparent;
  color:var(--gold-lt);font-family:'Oswald';font-weight:600;font-size:16px;letter-spacing:1px;cursor:pointer;
  text-align:center;transition:background .15s,color .15s}
.time-btn.active{background:var(--gold);color:var(--ink)}
.ib-detail{margin-top:12px}
.ib-detail h3{font-size:20px;color:var(--gold-lt);margin-bottom:8px}
.ib-field{margin-bottom:10px;font-size:15px;line-height:1.5}
.ib-field strong{color:var(--gold);font-family:'Oswald';font-weight:600;letter-spacing:1px;
  text-transform:uppercase;font-size:13px;display:block;margin-bottom:2px}
.affirm-text{font-style:italic;font-size:17px;line-height:1.6;color:var(--cream);opacity:.95;
  padding:14px 16px;background:rgba(216,168,72,.12);border-left:4px solid var(--gold);border-radius:8px}
.pdf-thumb{display:block;cursor:pointer;border-radius:12px;overflow:hidden;border:1px solid rgba(216,168,72,.3);
  position:relative;text-align:center;background:var(--green2);text-decoration:none}
.pdf-thumb img{width:100%;display:block;border-radius:12px}
.pdf-thumb:active{opacity:.85}
.pdf-thumb-label{position:absolute;bottom:0;left:0;right:0;padding:10px;
  background:linear-gradient(transparent,rgba(0,0,0,.7));color:var(--gold-lt);
  font-family:'Oswald';font-weight:600;letter-spacing:1px;font-size:13px;text-transform:uppercase}
.pdf-viewer-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.95);
  display:flex;flex-direction:column;overflow:hidden}
.img-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.95);
  display:flex;flex-direction:column;overflow:hidden}
.img-overlay-top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;flex:0 0 auto}
.img-overlay-top span{font-family:'Oswald';font-weight:600;color:var(--gold-lt);font-size:16px;letter-spacing:1px}
.img-overlay-top button{background:none;border:none;color:var(--gold);font-family:'Oswald';
  font-weight:600;font-size:16px;letter-spacing:1px;cursor:pointer;padding:4px 8px}
.img-overlay-body{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;
  justify-content:center;padding:0 8px 20px}
.img-overlay-body img{width:100%;max-width:700px;height:auto;object-fit:contain}
.hidden{display:none}
.vidcard{display:flex;align-items:center;gap:14px;text-decoration:none;background:#000;
  border:1px solid rgba(216,168,72,.4);border-radius:12px;padding:18px 16px;color:var(--cream)}
.vidcard .playbtn{display:flex;align-items:center;justify-content:center;width:46px;height:46px;
  background:var(--gold);color:#000;border-radius:50%;font-size:16px;flex:0 0 auto}
.vidcard .vidlabel{font-family:'Oswald';font-weight:600;letter-spacing:1px;font-size:17px;flex:1}
.vidcard .vidhint{font-size:11px;color:rgba(245,242,232,.5);text-transform:uppercase;letter-spacing:1px}
.switcher{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0 4px}
.switcher button{background:rgba(216,168,72,.18);color:var(--gold);border:1px solid rgba(216,168,72,.4);
  width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer}
.switcher span{font-family:'Oswald';font-weight:600;letter-spacing:1px;color:rgba(245,242,232,.8);font-size:14px}
.checkin-live{border:2px solid var(--gold);box-shadow:0 0 0 4px rgba(216,168,72,.15),0 10px 30px rgba(0,0,0,.3);
  background:linear-gradient(160deg,rgba(216,168,72,.16),var(--green2))}
.live-dot{display:inline-block;color:var(--gold-lt);font-family:'Oswald';font-weight:600;letter-spacing:2px;
  text-transform:uppercase;font-size:13px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.checkin-quiet{display:flex;flex-direction:column;align-items:center;gap:6px;
  color:rgba(245,242,232,.55);font-size:13px;padding:14px 0;margin:6px 0}
.demo-toggle{background:none;border:none;color:var(--gold);font-size:12px;cursor:pointer;
  text-decoration:underline;font-family:'Mulish';padding:6px 0}
.foot{text-align:center;color:rgba(245,242,232,.4);font-size:12px;margin-top:30px;line-height:1.6}
.admin-link{text-align:center;margin-top:8px}
.admin-link button{background:none;border:none;color:rgba(245,242,232,.3);font-size:11px;
  cursor:pointer;font-family:'Mulish';text-decoration:underline}
.admin-field{margin:12px 0}
.admin-field label{display:block;font-family:'Oswald';font-weight:600;letter-spacing:1px;
  text-transform:uppercase;color:var(--gold);font-size:13px;margin-bottom:4px}
.admin-row{display:flex;gap:8px;align-items:center;margin:8px 0}
.admin-row input{flex:1}
.admin-evt{background:rgba(255,255,255,.05);border-radius:10px;padding:12px;margin:8px 0;
  display:flex;justify-content:space-between;align-items:center}
.admin-evt-info{flex:1}
.admin-evt-del{background:none;border:1px solid rgba(245,100,100,.5);color:rgba(245,100,100,.8);
  border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:'Oswald';letter-spacing:1px}
.override-btns{display:flex;gap:8px;margin:6px 0}
.override-btn{flex:1;padding:10px;border-radius:10px;border:2px solid var(--gold);background:transparent;
  color:var(--gold-lt);font-family:'Oswald';font-weight:600;font-size:14px;cursor:pointer;text-align:center}
.override-btn.active{background:var(--gold);color:var(--ink)}
.hs-banner{background:linear-gradient(160deg,rgba(216,168,72,.18),rgba(216,168,72,.08));
  border:1px solid rgba(216,168,72,.4);border-radius:14px;padding:16px;margin:14px 0;
  display:flex;align-items:center;gap:14px}
.hs-banner .hs-icon{font-size:28px;flex:0 0 auto}
.hs-banner .hs-text{font-size:14px;line-height:1.5;flex:1}
.hs-banner .hs-text strong{color:var(--gold-lt)}
.hs-close{background:none;border:none;color:rgba(245,242,232,.5);font-size:18px;cursor:pointer;
  padding:4px 8px;flex:0 0 auto}
.status-msg{padding:10px;border-radius:8px;margin:8px 0;text-align:center;font-size:14px}
.status-ok{background:rgba(40,167,69,.2);color:#6fdc8c}
.status-err{background:rgba(220,53,69,.2);color:#f5948a}
.evt{border-left:3px solid var(--gold);padding:8px 0 8px 14px;margin:12px 0}
.evt .d{color:var(--gold);font-family:'Oswald';font-weight:600;font-size:14px;letter-spacing:1px}
</style>
</head>

      debrief: "Where do you think that strength of yours actually came from?\nIf some of your best pieces came out of the hard stuff, does that change how you see it?\nA mosaic needs a lot of different pieces to work. What does that say about this group?"
    },
    "15": {
      title: "Two Paths",
      objective: "Put the three paths in front of them, make them pick one out loud, then own it.",
      setup: "Use the length of the gym or field. Mark three zones with cones or floor spots: one wall is the Easy Path, the middle is the Better Path, the far wall is the Excellent Path.",
      instructions: "1. Mark the three zones across the space. Easy Path at one wall, Better Path in the middle, Excellent Path at the far wall.\n2. Explain the three. Easy, you treat people however you feel like. Better, you treat people exactly how they treat you. Excellent, you treat people better than they treat you.\n3. Read a quick everyday scenario. Someone talks behind your back. Someone owes you and does not pay you back. A teammate keeps messing up.\n4. After each scenario, kids walk to the zone for the path they would honestly take, not the one that sounds good.\n5. Pull a couple of kids and ask why they are standing where they are. No wrong spot. Make them own it.",
      debrief: "Which path is hardest to actually walk, and why?\nThe Excellent Path costs you something every time. What do you get back that makes it worth it?\nWhich path do most people around you live on, and is that the path you want?"
    }
  },
  8: {
    "5": {
      title: "The Twenty",
      objective: "Show that worth does not change based on how something gets treated. Fast, physical, and it lands before anyone can deflect.",
      setup: "One twenty dollar bill. Any bill works, or even a folded piece of paper standing in for one. Circle, open floor.",
      instructions: "1. Hold up the bill and ask who wants it. Hands go up.\n2. Crumple it in your fist, drop it, step on it, mess it up. Ask again who still wants it. The hands stay up.\n3. Make the point. You all still want it because messing it up did not change what it is worth. It is still a twenty.\n4. Land it. People are the same. What you have been through did not lower your value. You are still worth full price.",
      debrief: "Why did you still want the bill after it got crumpled and stepped on?\nIf that is true for a twenty, why do we act like it is not true for people?\nWhat is something you have been through that you figured lowered your value but actually did not?"
    },
    "10": {
      title: "Clearance Rack or Glass Case",
      objective: "Get them to see the everyday choices that mark a person up or down, and own where they have been parking themselves.",
      setup: "Mark two zones with cones or two walls. One side is the Clearance Rack. The other side is the Glass Case. Open floor in between.",
      instructions: "1. Explain the two. The clearance rack is where stuff gets marked down and ignored. The glass case is where the valuables get kept and protected.\n2. Read out one behavior at a time. Examples: letting people talk to you any kind of way, keeping your word, talking yourself down so nobody calls you cocky, showing up when you said you would, copying everybody else just to fit in.\n3. After each one, kids move to the rack or the case depending on whether that behavior marks a person up or down.\n4. Once they have sorted a few, ask which rack their actual week has looked like. No judgment, just honesty.",
      debrief: "Which of those behaviors marks a person down the fastest?\nWhat is one thing you already do that puts you in the glass case without you even trying?\nWhat is one clearance rack habit you would drop if you fully decided you were valuable?"
    },
    "15": {
      title: "Worth the Hire",
      objective: "Force them to make the case for their own value out loud, with evidence, like they are selling the most important thing they own, which is themselves.",
      setup: "Pairs. Open floor or bleachers. No supplies needed.",
      instructions: "1. Pair everyone up. Tell them they are now each other\'s agent, the person whose whole job is to talk up how valuable their partner is.\n2. Give them two minutes to interview their partner. Find real things. What are they good at, what have they pulled off, who counts on them, what do they bring to a room.\n3. Each agent introduces their partner to the group in about thirty seconds and sells their value out loud. Not roasting. Selling.\n4. The partner just stands there and takes it. No arguing it down, no joking it off. They have to let the value land.",
      debrief: "Which was harder, hyping up your partner or standing there and letting yours hype you?\nWhy is it so easy to see value in someone else and so hard to claim it for yourself?\nIf everything your agent just said is true, what price tag should you actually be wearing?"
    }
  },
  9: {
    "5": {
      title: "In Your Control, Not in Your Control",
      objective: "Get them sorting fast what they can and cannot control, so responsibility lands as the stuff in their hands, not everything that ever happened to them.",
      setup: "Two zones with cones or two walls. One side is In My Control. The other side is Not in My Control. Open floor between them.",
      instructions: "1. Mark the two zones. One side In My Control, the other Not in My Control.\n2. Call out one thing at a time. Examples: the weather, how you treat people, what people say about you, whether you show up, the family you were born into, how you respond when somebody disrespects you, your effort.\n3. After each one, kids move to the side they think it belongs on.\n4. When something splits the room, like what people say about you, name the move. You cannot control what they say. You can control what you do about it.",
      debrief: "Which one surprised you, something you thought you controlled but do not, or the other way around?\nResponsibility lives on only one of these sides. Which one?\nWhat is one thing on the Not in My Control side that you have been wasting energy on?"
    },
    "10": {
      title: "The Mirror Says",
      objective: "Make the only I can idea physical. Separate what others can do for you from what only you can do.",
      setup: "Circle or pairs. No supplies needed.",
      instructions: "1. Explain the setup. There are things people can do for you and things only you can do, and they are not the same.\n2. Go around and hand each future leader the front half of one of these to finish. You can coach me, but only I can. You can teach me, but only I can. You can believe in me, but only I can.\n3. Let the answers be real, not perfect. The point is they hear themselves say the only I can part out loud.\n4. Close the circle by pointing out that every single answer ended with I. That is the mirror. That is responsibility.",
      debrief: "Which is harder for you, the part others do or the part only you can do?\nWhere in your life have you been waiting on somebody else to do the part that is actually yours?\nWhat is one only I can move you have been avoiding?"
    },
    "15": {
      title: "Step Up to the Mirror",
      objective: "Walk the full arc. Own a real area, name the next move, and commit to it in front of the group.",
      setup: "Open floor. Mark one spot as the mirror with a cone or a taped line. No supplies needed.",
      instructions: "1. Set one spot as the mirror. Tell them stepping up to it means owning one area of their life out loud, not the fault, the move.\n2. Give them a minute to pick one area they want to take control of. School, attitude, a relationship, a habit, whatever is real for them.\n3. One at a time, a future leader steps up to the mirror spot and says the area and the one move they will make. Keep it short. I am taking control of, and my move is.\n4. After each one, the group gives a single clap or a nod. No roasting, no advice, just witnessed. Being seen making the commitment is the point.",
      debrief: "How did it feel to say your move out loud with people watching instead of just thinking it?\nWhy is it easier to name the problem than to name the move?\nWho in this room are you going to let check on whether you actually made your move?"
    }
  },
  10: {
    "5": {
      title: "Easy Brave or Hard Brave",
      objective: "Reset the definition fast. Get them sorting the loud kind of courage from the hard quiet kind before anything else happens.",
      setup: "Two zones with cones or two walls. One side Easy Brave, the other side Hard Brave. Open floor between them.",
      instructions: "1. Mark the two zones. One side Easy Brave, the other Hard Brave.\n2. Call out a move one at a time. Examples: swinging on somebody who disrespected you, walking away from that same fight, talking trash back, telling a coach the truth about something you did, taking a dare, standing up for a kid getting picked on, going along with the crowd.\n3. After each one, kids move to the side they think it lands on, easy brave or hard brave.\n4. Point out the pattern as it builds. The stuff that looks toughest is usually the easy kind. The stuff that looks soft is usually the hard kind.",
      debrief: "Which kind of brave gets more respect in your world, and which one actually takes more?\nWhy is walking away harder than swinging?\nWhich kind do you want to be known for?"
    },
    "10": {
      title: "Move Scared",
      objective: "Make the action-before-feeling idea physical. Show that you do the thing first and the nerve catches up after.",
      setup: "Line everyone up behind a start line, marked with cones or just a spot on the floor. No supplies needed.",
      instructions: "1. Line everyone up behind the start line. Tell them you will call out small brave moves and they step across only if they have ever done it.\n2. Start light and build. Step across if you have ever raised your hand when you were not sure. If you have ever apologized first. If you have ever stood up for somebody. If you have ever told the truth knowing it would cost you.\n3. Each step, point out that nobody who crossed felt one hundred percent ready first. They moved anyway.\n4. Land it. That hesitation they felt before stepping is exactly what fear feels like, and stepping anyway is exactly what courage is. They just did reps of it.",
      debrief: "Did you feel ready before you stepped, or did you just step?\nWhat is one move you did not step across for, that you wish you had?\nIf brave is just moving before you feel ready, what is one move you could make this week?"
    },
    "15": {
      title: "The Cornerstone",
      objective: "Land the anchor. Each future leader names the one hard thing they will build their courage on, and the group watches the wall go up.",
      setup: "Circle. If you have cones, blocks, or balled-up paper, you will stack one per person to build a visible pile. No supplies works too, just go around.",
      instructions: "1. Explain the cornerstone. It is the first stone a builder sets, the one everything else stands on. Courage is that stone for your life.\n2. Go around the circle. Each future leader names one scared-but-right move they are committing to this week. The truth they will tell, the fight they will walk away from, the person they will pull up.\n3. As each one says theirs, they add a stone to the pile in the middle, a cone, a block, whatever you have. If no supplies, they step into the circle and say it.\n4. When the last one goes, point at the pile. Every one of those is a hard thing somebody chose to do scared. That is what a wall of courage looks like, built one stone at a time.",
      debrief: "Which was harder, picking your move or saying it out loud in front of everybody?\nWhose stone are you going to remember, and why?\nCourage is contagious. Whose courage this week could you be the one to spark?"
    }
  },
  11: {
    "5": {
      title: "Wait or Make",
      objective: "Drive the core split fast. Get them feeling the difference between waiting for something to happen and making it happen.",
      setup: "Two zones with cones or two walls. One side Wait, the other side Make. Open floor between them.",
      instructions: "1. Mark the two zones. One side Wait, the other Make.\n2. Read a situation one at a time. Examples: you want to be on the team but tryouts are coming, you and a friend got into it and neither of you has texted, your grade is slipping in one class, somebody new is sitting alone at lunch, you want a job but have not applied anywhere.\n3. After each one, kids move to Wait or Make depending on what they would honestly do, not what sounds good.\n4. Point out the pattern. The Make side is where things actually change. The Wait side is where you hope somebody else throws the stone for you.",
      debrief: "Which side do you spend most of your life standing on?\nWhat is one thing you have been on the Wait side about for too long?\nWhat would it take to step over to Make on that one?"
    },
    "10": {
      title: "First Ripple",
      objective: "Make the throw and the ripple physical, and show that one small move sets off more than you can see.",
      setup: "Circle. No supplies, or one ball or balled-up paper to pass as the stone.",
      instructions: "1. Get them in a circle. Tell them the circle is a still pond and the stone is about to get thrown.\n2. Start with one future leader doing one small positive action toward the person on their right. A real compliment, a fist bump, calling out one thing that person is good at.\n3. That person then does the same toward the next, and it travels all the way around. The ripple moves one person at a time.\n4. When it gets back to the start, point out that one small first move just touched every single person in the circle. That is a ripple. Nobody planned the whole thing. One person just threw.",
      debrief: "How far did one small move travel?\nThe first person could not see the whole ripple coming. Does that change how you think about small moves?\nWhat is one small throw you could make tomorrow that might travel further than you think?"
    },
    "15": {
      title: "Name the Throw",
      objective: "Move from idea to commitment. Each future leader picks one real thing they have been waiting on and commits to the first move.",
      setup: "Circle or pairs. No supplies needed.",
      instructions: "1. Give them a quiet minute to think of one thing in their life that is sitting still because they have been waiting instead of throwing.\n2. Have them shrink it down to the smallest first move. Not the whole fix. The first stone. One text, one application, one conversation, one rep.\n3. Go around. Each future leader names the still pond and the one small throw they will make this week. Keep it short. I have been waiting on, and my first throw is.\n4. After each one, the group gives a nod or a single clap. Witnessed, not judged. Then point out that the room just watched a bunch of people stop waiting at the same time.",
      debrief: "Was it harder to pick the pond or to shrink it down to one small throw?\nWhy do we wait on stuff we already know how to start?\nWho in this room is going to ask you next week whether you actually threw it?"
    }
  },
  12: {
    "5": {
      title: "Name Your Rock",
      objective: "Get every future leader to name one thing that actually matters to them, fast, no overthinking.",
      setup: "Circle up. No supplies.",
      instructions: "1. Bring the whole group into one circle.\n2. Go around. Each future leader says their name and one rock, the thing in their life that matters most.\n3. Keep it to one word or one sentence. No explaining, no judging.\n4. If someone freezes, skip them and come back at the end. Do not let it stall.",
      debrief: "Did anybody\'s rock surprise you?\nHow many of us actually spend our time on the thing we just named?"
    },
    "10": {
      title: "The Jar",
      objective: "Make the lesson land in their hands instead of just their ears.",
      setup: "One container (jar, bucket, or cup). A few big rocks or balls, some gravel or smaller balls, and sand or torn paper scraps. Basic gear is fine.",
      instructions: "1. Hand a future leader the container and have them pour the sand in first, then the gravel.\n2. Now have them try to fit the big rocks on top. They will not go in.\n3. Dump it out. Have them start over: rocks first, then gravel, then sand.\n4. It all fits this time. Let the group call out what just happened before you say a word.",
      debrief: "What changed? Same stuff, same jar.\nWhat is the sand in your life that you pour in first without even thinking about it?\nWhat would it look like to put your rocks in first this week?"
    },
    "15": {
      title: "Two Out of Ten",
      objective: "Help future leaders find the small number of things that carry most of the weight, lived instead of lectured.",
      setup: "Open floor or court. Cones or markers optional. No supplies needed.",
      instructions: "1. Each future leader lists ten things they spend time on in a normal week, out loud or in their head.\n2. Cut it down to the two that matter most, the two that would change the most if done right.\n3. Pair up. Each one tells their partner their two and why.\n4. A few share with the whole group.\n5. Push the real question: are you spending your time on those two, or on the other eight?",
      debrief: "Was it hard to pick just two? Why?\nWhat is one of the eight you could let go of, or say \"not right now\" to?\nIf you put your two first this week, who else does that help, not just you?"
    }
  },
  13: {
    "5": {
      title: "One Thing I Am Working On",
      objective: "Get every future leader to admit, out loud, one thing they want to get better at. That admission is teachability in real time.",
      setup: "Circle up. No supplies.",
      instructions: "1. Bring the whole group into one circle.\n2. Each future leader says their name and one thing they are trying to get better at. Anything counts. Free throws, keeping their cool, school, a job.\n3. One sentence. Nobody gives advice, they just say it and pass.\n4. If someone freezes, skip them and come back at the end.",
      debrief: "Was it harder than it sounds to admit out loud that you are working on something?\nYou know somebody who acts like they have nothing to work on. How is that going for them?"
    },
    "10": {
      title: "Coach Me Through It",
      objective: "Let them feel the difference between fighting direction and trusting a coach. That trust is what teachable feels like.",
      setup: "Pairs. Open floor with a few cones, water bottles, or markers scattered as obstacles. Basic gear is fine.",
      instructions: "1. Scatter a simple path of obstacles across the floor.\n2. One future leader closes their eyes. Their partner is the coach, voice only, no touching.\n3. The coach talks them through the path step by step. The walker has to trust the voice and adjust when corrected.\n4. Switch roles so everyone coaches and everyone gets coached.",
      debrief: "Was it easier to trust your coach, or did part of you want to just do it your own way?\nWhen the coach corrected you, did you get tight or did you adjust? Same thing happens in real life.\nWho is a coach voice in your real life that you actually trust?"
    },
    "15": {
      title: "The Same Hole",
      objective: "Help future leaders name a mistake they keep repeating and picture what changing the pattern actually looks like.",
      setup: "Circle or small groups. One cone or object in the middle to stand for \"the hole.\" No other supplies needed.",
      instructions: "1. Put the cone in the middle. Tell them it stands for a hole people keep falling into, the same mistake over and over.\n2. Walk the stages out loud: first time you fall in, you blame everybody else. Next time you see it coming and still fall in. Then you start stepping around it. Eventually you just walk a different street.\n3. Each future leader names one hole they keep falling in, only what they are willing to share. Skipping school, blowing up when angry, the wrong crowd, whatever it is.\n4. Then they say what \"walking around it\" would actually look like this week.\n5. Share in pairs or small groups first, then a few share with the whole room.",
      debrief: "What stage are you at with your hole, blaming everyone, seeing it but still falling, or stepping around it?\nWhat is one thing that would move you one stage forward?\nWho could help you walk around it, if you actually let them?"
    }
  },
  14: {
    "5": {
      title: "Uphill or Downhill",
      objective: "Get future leaders to see, fast, that their daily habits are either walking them uphill or downhill.",
      setup: "Open floor. Mark one side of the room uphill and the other downhill. No supplies, or two cones.",
      instructions: "1. Mark an uphill side and a downhill side of the room.\n2. Call out a habit, like scrolling your phone until 2am, showing up on time, skipping class, or hitting the gym.\n3. Future leaders walk to the side they think it belongs on, uphill or downhill.\n4. Move fast. Call out eight or ten habits and keep them moving.",
      debrief: "Which side did you end up on more, uphill or downhill?\nWhat is one downhill habit you would want to flip?"
    },
    "10": {
      title: "Hold the Climb",
      objective: "Let them feel uphill effort in their legs, and feel how easy it is to quit.",
      setup: "A clear wall. No other supplies.",
      instructions: "1. Everyone gets into a wall sit, back flat on the wall, knees bent like sitting in an invisible chair. That burn is the climb.\n2. Hold it while you talk. Point out that this is what uphill feels like. It burns, and your body is begging you to stop.\n3. Tell them they can drop anytime. Quitting is instant and it feels great for a second. That is the downhill slide.\n4. Go again. This time challenge them to hold ten seconds past when they wanted to quit. That ten seconds is self-discipline.\nSafety note: keep it to wall sits, no horseplay against the wall. Anyone with a knee issue can sit this one out and be the timer.",
      debrief: "How did your body feel right before you wanted to quit?\nWhat does ten seconds past quitting look like in your real life?"
    },
    "15": {
      title: "One Promise",
      objective: "Move from idea to a concrete, small, kept promise, and connect thinking to habit.",
      setup: "Circle or small groups. No supplies. Paper optional.",
      instructions: "1. Walk the chain out loud: how you think sets your habits, and your habits become who you are. Think life is easy and you slide. Think it is hard and you climb.\n2. Each future leader picks one small uphill move for this week. Small on purpose. Make your bed every morning. Show up on time. Ten pushups before bed. Something they can actually do.\n3. The rule: it has to be small enough that they have no excuse. If it sounds impressive, it is too big. Shrink it.\n4. They tell a partner their one promise and why that one. Then they become each other\'s check-in for the week.\n5. A few share with the whole room.",
      debrief: "Why did you pick that one?\nWhat is the thought that has been keeping you from doing it?\nWho is going to know if you actually do it this week?"
    }
  },
  15: {
    "5": {
      title: "Bounce Back",
      objective: "Get future leaders to name, fast, one thing they have already come back from. Proof they are already resilient.",
      setup: "Circle up. No supplies.",
      instructions: "1. Bring the whole group into one circle.\n2. Each future leader says their name and one thing they have already bounced back from. Could be small, could be big, only what they want to share.\n3. One sentence. No need to tell the whole story.\n4. Anybody can pass. Come back to them at the end.",
      debrief: "Notice how everybody in this circle has already come back from something? That is resilience. You already have it.\nWhat helped you get back up that time?"
    },
    "10": {
      title: "Stop Sign or Lesson",
      objective: "Let them practice flipping a failure from an enemy into a teacher, out loud.",
      setup: "Open floor or circle. No supplies.",
      instructions: "1. Call out a common fail, like bombing a test, getting cut from a team, messing up at a job, or blowing up on somebody.\n2. First ask the group what it looks like to make that a stop sign. Quit, get bitter, give up. Take a couple answers.\n3. Then flip it. What does it look like to make that same fail a lesson? What would you do different, what did it teach you. Take a couple answers.\n4. Run three or four different fails, going enemy first then friend each time.",
      debrief: "Same exact fail, two totally different roads. Which road do you usually take?\nWhat is one fail in your life right now you could flip from a stop sign to a lesson?"
    },
    "15": {
      title: "The Comeback Plan",
      objective: "Move from idea to one concrete, hard, real action that earns self-respect, and tie it to feeling, then choosing.",
      setup: "Circle or small groups. No supplies. Paper optional.",
      instructions: "1. Talk it through: real self-respect does not come from people hyping you up. It comes from doing something hard and watching yourself do it.\n2. Each future leader picks one hard thing they could actually do this week. Hard enough that doing it earns a little self-respect, real enough that it is possible. Apologize to someone. Show up somewhere they have been avoiding. Finish something they started.\n3. Then they name the feeling that usually stops them, fear, anger, embarrassment, not caring, and say out loud: I am going to feel that and do it anyway.\n4. Share with a partner, then pair up as check-ins for the week.\n5. A few share with the whole room.",
      debrief: "Why that one? What makes it hard?\nWhat is the feeling that usually stops you, and what would it look like to feel it and move anyway?\nWho is going to know if you actually did it?"
    }
  },
  16: {
    "5": {
      title: "Thirty Seconds",
      objective: "Let future leaders practice the easiest form of influence, saying one real positive thing, right now in the room.",
      setup: "Pairs. No supplies.",
      instructions: "1. Everyone grabs a partner, ideally someone they do not know as well.\n2. Each person has thirty seconds to tell their partner one real, positive thing. Something they have noticed, something they respect. No fake stuff.\n3. Switch. The other partner goes.\n4. Quick round, keep it moving, then bring it back together.",
      debrief: "How did it feel to get told something real? How did it feel to give it?\nThat took thirty seconds and cost nothing. Who in your life needs to hear something real from you?"
    },
    "10": {
      title: "Who Is Watching You",
      objective: "Move each kid from \"I am the one being helped\" to \"I am someone others watch and learn from.\"",
      setup: "Circle or small groups. No supplies.",
      instructions: "1. Ask them to think of one person younger than them, or who looks up to them. A sibling, a cousin, a kid in the neighborhood.\n2. Each future leader names that person out loud and one thing that person might copy from watching them, good or bad.\n3. Then the real question: what is one thing you would want them to catch you doing?\n4. Let a few share. Do not force everyone.",
      debrief: "Did it change anything to realize someone is actually watching you?\nWhat is one thing you want to be the example of for that person?"
    },
    "15": {
      title: "The Sendoff Circle (Program Closing Ritual)",
      objective: "Close the full sixteen weeks by making sure every future leader is seen and named, and leaves carrying their own lit candle forward.",
      setup: "One big circle, the whole group together, coaches included. Optional: battery LED tea lights or phone flashlights, one per person. Do not use real open flames indoors with the group.",
      instructions: "1. Everyone stands in one circle. This is the last time this whole room is together, so treat it that way.\n2. Going around the circle, each future leader gets named for one real thing, by a coach or by the person next to them. One genuine sentence. Every single kid gets named. Nobody gets skipped.\n3. As each kid is named, they turn on their light, or just put a hand on the shoulder of the next person, and pass it on. The light moving around the circle is the influence moving on.\n4. When it has gone all the way around and everyone is holding a light, close with the message: you came in here being worked on, you are leaving with a lit candle. Somebody out there is waiting for you to light theirs.\n5. Let them have a minute. Then send them off.",
      debrief: "What is one thing you are taking with you from these sixteen weeks?\nWho is the first candle you are going to light out there?"
    }
  }
};

const AFFIRMATIONS = {
  1: "The gift was never where you started. The gift is that you get to choose what comes next. Tonight, you choose.",

  3: "You do not get to pick what gets thrown at you. You pick what you do with it. That is the one thing that is always yours, and it colors everything else. So today, you decide how this goes.",

  6: "What you are on the inside is the only thing that makes you rise. Nobody can see it, nobody can take it, and it is built one choice at a time. Whatever is behind you, you get to build it starting tonight.",
  7: "Everything you want for your life is sitting on the other side of letting this go. All the possibilities are over there. Forgiveness is the door.",
  8: "The number you put on yourself tonight is the number the world is going to pay you. So write it high, and back it up. You are not on the clearance rack. You never were.",

// Auto-calculate current lesson: Week 1 starts Sun May 31, 2026, changes every Sunday midnight
function currentWeek(){
  const start = new Date('2026-05-31T00:00:00-04:00'); // Week 1 Sunday, Eastern
  const now = new Date();
  const msPerWeek = 7 * 24 * 60 * 60 * 1000;
  const weeksElapsed = Math.floor((now - start) / msPerWeek);
  return (((weeksElapsed % 16) + 16) % 16) + 1; // always 1–16, handles before start too
}

function openImgOverlay(id, label){

  top.className = 'img-overlay-top';
  var title = document.createElement('span');
  title.textContent = label;

  closeBtn.innerHTML = '&times; Close';
  closeBtn.onclick = function(){ overlay.remove(); };
  top.appendChild(title);

function windowOpen(){
  if(state.demoWindow) return true;
  // Check for admin override from server
  if(state.windowOverride==='open') return true;
  if(state.windowOverride==='closed') return false;
  const w=CFG.window; const now=new Date();
  const day=now.getDay(); // 0 Sun ... 3 Wed
  const dayOk = day===3;
  const mins=now.getHours()*60+now.getMinutes();
  const [oh,om]=w.open.split(':').map(Number); const [ch,cm]=w.close.split(':').map(Number);
  return dayOk && mins>=oh*60+om && mins<=ch*60+cm;
}

function addEvent(){
  const title = document.getElementById('evt-title').value.trim();
  const date = document.getElementById('evt-date').value.trim();
  const time = document.getElementById('evt-time').value.trim();
  const loc = document.getElementById('evt-loc').value.trim();
  const note = document.getElementById('evt-note').value.trim();
  const rsvp = document.getElementById('evt-rsvp').value.trim();
  const msg = document.getElementById('evt-msg');
  if(!title){ msg.innerHTML='<div class="status-msg status-err">Title is required.</div>'; return; }
  const events = state.adminSettings.events || [];
  const evt = {title:title, date:date, time:time, location:loc, note:note};
  if(rsvp) evt.rsvp = rsvp;
  events.push(evt);
  msg.innerHTML='<div class="status-msg">Saving...</div>';
  fetch(sheetUrl(), {
    method:'POST',
    body:JSON.stringify({action:'saveEvents', adminPassword:state.adminPw, events:events}),
    headers:{'Content-Type':'text/plain'}
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==='ok'){
      state.adminSettings.events=events;
      go('admin');
    } else msg.innerHTML='<div class="status-msg status-err">Failed to save.</div>';
  })
  .catch(()=>msg.innerHTML='<div class="status-msg status-err">Could not reach server.</div>');
}

function removeEvent(idx){
  const events = state.adminSettings.events || [];
  events.splice(idx,1);
  fetch(sheetUrl(), {
    method:'POST',
    body:JSON.stringify({action:'saveEvents', adminPassword:state.adminPw, events:events}),
    headers:{'Content-Type':'text/plain'}
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==='ok'){
      state.adminSettings.events=events;
      go('admin');
    }
  });
}

// ─── Routing ───────────────────────────────────────────────────
function go(v){ state.view=v; if(v==='home'){state.coach=false; state.adminPw=''; state.adminSettings=null;} render(); }
function render(){
  if(state.view==='home') home();
  else if(state.view==='parent') parentView();
  else if(state.view==='coachgate') coachGate();
  else if(state.view==='coach') coachView();
  else if(state.view==='admingate') adminGate();
  else if(state.view==='admin') adminView();
}
render();
</script>
