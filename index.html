<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PAL Leadership Weekly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#04300f; --green2:#0a4a21; --green-logo:#006018;
  --gold:#d8a848; --gold-lt:#ebc878; --cream:#f5f2e8; --ink:#10210f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Mulish',sans-serif;background:var(--green);color:var(--cream);
  -webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 60px}
h1,h2,h3,.disp{font-family:'Oswald',sans-serif;letter-spacing:.5px}
.logo{display:block;margin:22px auto 6px;width:230px;max-width:64%}
.tag{text-align:center;color:var(--gold);font-family:'Oswald';font-weight:600;
  letter-spacing:3px;text-transform:uppercase;font-size:13px;margin-bottom:18px}
.card{background:linear-gradient(160deg,var(--green2),var(--green));
  border:1px solid rgba(216,168,72,.35);border-radius:16px;padding:22px;margin:16px 0;
  box-shadow:0 10px 30px rgba(0,0,0,.25)}
.btn{display:block;width:100%;text-align:center;font-family:'Oswald';font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;padding:20px;border-radius:14px;border:none;
  cursor:pointer;font-size:18px;margin:14px 0;transition:transform .12s ease}
.btn:active{transform:scale(.98)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-out{background:transparent;color:var(--gold-lt);border:2px solid var(--gold)}
.gate-title{text-align:center;font-size:30px;font-weight:700;text-transform:uppercase;margin:30px 0 6px}
.gate-sub{text-align:center;color:rgba(245,242,232,.7);margin-bottom:20px;font-size:15px}
.lesson-banner{background:linear-gradient(160deg,var(--green2),var(--green));
  border:2px solid var(--gold);border-radius:16px;padding:24px 20px;text-align:center;margin:8px 0 18px}
.lesson-week{color:var(--gold);font-family:'Oswald';font-weight:600;letter-spacing:3px;font-size:14px}
.lesson-name{font-family:'Oswald';font-weight:700;font-size:46px;color:var(--gold-lt);
  text-transform:uppercase;line-height:1.05;margin:4px 0}
.lesson-take{font-style:italic;color:var(--cream);font-size:17px;margin-top:10px;opacity:.92}
.sect-label{font-family:'Oswald';font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);font-size:14px;margin:4px 0 10px;display:flex;align-items:center;gap:8px}
.video{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#000;border:1px solid rgba(216,168,72,.3)}
.video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.action-box{background:rgba(216,168,72,.12);border-left:4px solid var(--gold);
  border-radius:8px;padding:14px 16px;font-size:16px;line-height:1.5}
.missing{color:rgba(245,242,232,.55);font-size:14px;font-style:italic;padding:10px 0}
input[type=text],input[type=password]{width:100%;padding:14px;border-radius:10px;border:1px solid rgba(216,168,72,.4);
  background:rgba(255,255,255,.06);color:var(--cream);font-size:16px;font-family:'Mulish';margin:6px 0}
input::placeholder{color:rgba(245,242,232,.45)}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--gold);background:none;border:none;
  font-family:'Oswald';font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  font-size:13px;padding:18px 0 4px}
.pill{display:inline-block;background:rgba(216,168,72,.18);color:var(--gold-lt);border-radius:20px;
  padding:4px 12px;font-size:12px;font-family:'Oswald';letter-spacing:1px;text-transform:uppercase}
.row-links a{display:block;text-align:center;color:var(--gold-lt);text-decoration:none;border:1px solid rgba(216,168,72,.35);
  border-radius:12px;padding:14px;margin:10px 0;font-family:'Oswald';font-weight:600;letter-spacing:1px;text-transform:uppercase;font-size:15px}
.note{background:rgba(0,0,0,.25);border:1px dashed rgba(216,168,72,.4);border-radius:10px;padding:12px 14px;
  font-size:13px;color:rgba(245,242,232,.75);margin:14px 0}
.ok{color:#7fd18c;font-weight:700;text-align:center;padding:14px;font-size:17px}
.err{color:#f0a3a3;text-align:center;padding:8px;font-size:14px}
.docrow{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(255,255,255,.05);border-radius:10px;padding:14px;margin:8px 0;font-size:15px}
.docrow .dl{color:var(--gold);font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:1px}
a.docrow{text-decoration:none;color:var(--cream)}
.hidden{display:none}
.vidcard{display:flex;align-items:center;gap:14px;text-decoration:none;background:#000;
  border:1px solid rgba(216,168,72,.4);border-radius:12px;padding:18px 16px;color:var(--cream)}
.vidcard .playbtn{display:flex;align-items:center;justify-content:center;width:46px;height:46px;
  background:var(--gold);color:#000;border-radius:50%;font-size:16px;flex:0 0 auto}
.vidcard .vidlabel{font-family:'Oswald';font-weight:600;letter-spacing:1px;font-size:17px;flex:1}
.vidcard .vidhint{font-size:11px;color:rgba(245,242,232,.5);text-transform:uppercase;letter-spacing:1px}
.switcher{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0 4px}
.switcher button{background:rgba(216,168,72,.18);color:var(--gold);border:1px solid rgba(216,168,72,.4);
  width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer}
.switcher span{font-family:'Oswald';font-weight:600;letter-spacing:1px;color:rgba(245,242,232,.8);font-size:14px}
.checkin-live{border:2px solid var(--gold);box-shadow:0 0 0 4px rgba(216,168,72,.15),0 10px 30px rgba(0,0,0,.3);
  background:linear-gradient(160deg,rgba(216,168,72,.16),var(--green2))}
.live-dot{display:inline-block;color:var(--gold-lt);font-family:'Oswald';font-weight:600;letter-spacing:2px;
  text-transform:uppercase;font-size:13px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.checkin-quiet{display:flex;flex-direction:column;align-items:center;gap:6px;
  color:rgba(245,242,232,.55);font-size:13px;padding:14px 0;margin:6px 0}
.demo-toggle{background:none;border:none;color:var(--gold);font-size:12px;cursor:pointer;
  text-decoration:underline;font-family:'Mulish';padding:6px 0}
.foot{text-align:center;color:rgba(245,242,232,.4);font-size:12px;margin-top:30px;line-height:1.6}
.evt{border-left:3px solid var(--gold);padding:8px 0 8px 14px;margin:12px 0}
.evt .d{color:var(--gold);font-family:'Oswald';font-weight:600;font-size:14px;letter-spacing:1px}
</style>
</head>

  12: {workbook:"1esNJGsp9fF3GkYhaspBWzdgYw2UHS4Eh",coachesCard:"1UDFIxg7Eo21yNF8T-Rv1paM-IiSQ9vgG",infographic:"1xQl2_eBOW8xPIsaj3tI-41W7w-Zp50iW",coachesInfographic:"1o7u-WT4RXOyI01Na8QzZzNeJStgSh6_b"},
  13: {workbook:"1Evqx4xXnhQ6WnyltbezTa80-qqZF7Gq6",coachesCard:"1TLLhWUY52qj1LI_CIRUKbQX191m4C9Hv",infographic:"1yG6wularR-JCX4XALRO09XWZSJaHjHa9",coachesInfographic:"1Z6lFSp5x4MiPmcDH2LcxMfEyq5Pb7sV6"},
  14: {workbook:"1xWioKxJkrVcA1FmEb8DsnLgu19jK1lsB",coachesCard:"1G1C3V74iHKsTsBLjaSUIKAnAis-YluhD",infographic:"1ieUoMYssXaFhzGCJIF7isGkYofo9Yq9U",coachesInfographic:"1tQ3cKHatA17rYHGLp4061FKT6o4k2n2j"},
  15: {workbook:"1tMRAVBFOE_0mdUSMwXeC3BO8bmyi6z8L",coachesCard:"1Z57dTAh7H76-LAfUHym-j-AXSrUw6I5W",infographic:"180KFvROZumKA3xpVhdmqAiLgwSnUKU67",coachesInfographic:"1frVO2AgsASil_i_-WYQIup5kpVL-Doyv"},
  16: {workbook:"1KBD4thX0VGC79V-ccoN4XJgunYnCXwUy",coachesCard:"1XI04u7IVRqLXcmF2Usn3_yqU2wwtzg5K",infographic:"16s0MtJ5_FGHdbvtVHw3F78HV1BVEcvMz",coachesInfographic:"1zjo4s0TVBTlZarf3XkJuIcSCuWL0synH"}
};
CFG.lessons.forEach(l => { l.fileIds = FILE_IDS[l.number]; });
function driveUrl(id){ return 'https://drive.google.com/file/d/'+id+'/view'; }
function docLink(id, label){ return id
  ? '<a class="docrow" href="'+driveUrl(id)+'" target="_blank"><span>'+label+'</span><span class="dl">PDF &rarr;</span></a>'
  : '<div class="docrow"><span>'+label+'</span><span class="dl missing">Not uploaded</span></div>'; }

let _cur = CFG.currentLesson;
function L(){ return CFG.lessons.find(x=>x.number===_cur) || CFG.lessons[0]; }
function stepLesson(d){ let n=_cur+d; if(n<1)n=16; if(n>16)n=1; _cur=n; render(); }
const norm = s => (s||"").toLowerCase().replace(/[\s\-_]/g,"");
const app = document.getElementById('app');
let state = {view:'home', coach:false, demoWindow:false};

function embed(id){ return id
  ? `<div class="video"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>`
  : `<div class="missing">Video coming soon for this week.</div>`; }

function windowOpen(){
  if(state.demoWindow) return true;
  const w=CFG.window; const now=new Date();
  // Demo uses device time (real build uses trusted server time). Eastern not enforced in preview.
  const day=now.getDay(); // 0 Sun ... 3 Wed
  const dayOk = day===3;
  const mins=now.getHours()*60+now.getMinutes();
  const [oh,om]=w.open.split(':').map(Number); const [ch,cm]=w.close.split(':').map(Number);
  return dayOk && mins>=oh*60+om && mins<=ch*60+cm;
}

function home(){
  app.innerHTML = `
   <div class="lesson-banner">
     <div class="lesson-week">This Week &middot; Week ${L().number}</div>
     <div class="lesson-name">${L().name}</div>
     <div class="lesson-take">"${L().takeaway}"</div>
   </div>
   <div class="switcher">
     <button onclick="stepLesson(-1)">&larr;</button>
     <span>Previewing Week ${L().number} of 16</span>
     <button onclick="stepLesson(1)">&rarr;</button>
   </div>
   <button class="btn btn-gold" onclick="go('parent')">I'm a Parent or Family</button>
   <button class="btn btn-out" onclick="go('coachgate')">I'm a Coach or Mentor</button>
   ${attendanceCard()}
   ${eventsCard()}
   <div class="row-links">
     <a href="${CFG.website}" target="_blank">Visit MartinCountyPAL.org</a>
     <a href="${CFG.youtube}" target="_blank">Subscribe on YouTube</a>
   </div>`;
}

function parentView(){
  const l=L();
  app.innerHTML = `
   <button class="back" onclick="go('home')">&larr; Back</button>
   <div class="lesson-banner">
     <div class="lesson-week">This Week &middot; Week ${l.number}</div>
     <div class="lesson-name">${l.name}</div>
   </div>
   <div class="card">
     <div class="sect-label">Weekly Brief</div>
     ${embed(l.brief,'the Weekly Brief')}
   </div>
   <div class="card">
     <div class="sect-label">Parent Podcast</div>
     ${embed(l.parent,'the Parent Podcast')}
   </div>
   <div class="card">
     <div class="sect-label">What Your Young Leader Is Working On</div>
     <div class="action-box">${l.action}</div>
   </div>
   <div class="card">
     <div class="sect-label">Lesson Visual</div>
     ${l.fileIds.infographic
       ? '<a class="btn btn-out" href="'+driveUrl(l.fileIds.infographic)+'" target="_blank">View Infographic</a>'
       : '<div class="missing">Infographic coming soon.</div>'}
   </div>
   <div class="row-links">
     <a href="${CFG.website}" target="_blank">MartinCountyPAL.org</a>
     <a href="${CFG.youtube}" target="_blank">Subscribe on YouTube</a>
   </div>`;
  wireAttendance();
}

function attendanceCard(){
  const open = windowOpen();
  const toggle = `<button class="demo-toggle" onclick="toggleDemo()">${state.demoWindow?'Turn off':'Turn on'} preview check-in (demo)</button>`;
  if(open){
    return `<div class="card checkin-live">
       <div class="live-dot">&#9679; Check-In Open</div>
       <div class="sect-label" style="margin-top:6px">Tonight's Check-In</div>
       <p style="margin-bottom:10px;font-size:15px;opacity:.95">Type your name and tonight's word.</p>
       <input type="text" id="kidname" placeholder="Your name">
       <input type="text" id="kidword" placeholder="Tonight's word">
       <button class="btn btn-gold" style="margin-top:8px" onclick="checkIn()">Check In</button>
       <div id="ci-msg"></div>
       <div class="note">Preview: window uses device time here. The real build checks a trusted Eastern clock and allows a coach override. ${toggle}</div>
     </div>`;
  }
  return `<div class="checkin-quiet">
     <span>Check-in opens Wednesdays 5:30 to 7:30 PM</span>
     ${toggle}
   </div>`;
}

function eventsCard(){
  if(!CFG.events || CFG.events.length===0){
    return `<div class="card"><div class="sect-label">Upcoming Events</div>
      <div class="missing">No events posted yet. You'll add these in the content file.</div></div>`;
  }
  const items = CFG.events.map(e=>`<div class="evt"><div class="d">${e.date||''} ${e.time||''}</div>
     <div style="font-weight:700">${e.title||''}</div>
     <div style="font-size:14px;opacity:.8">${e.location||''} ${e.note||''}</div></div>`).join('');
  return `<div class="card"><div class="sect-label">Upcoming Events</div>${items}</div>`;
}

function wireAttendance(){}
function toggleDemo(){ state.demoWindow=!state.demoWindow; render(); }
function checkIn(){
  const n=document.getElementById('kidname').value.trim();
  const w=document.getElementById('kidword').value;
  const msg=document.getElementById('ci-msg');
  if(!n){ msg.innerHTML='<div class="err">Please enter your name.</div>'; return; }
  if(norm(w)===norm(L().word)){
    msg.innerHTML=`<div class="ok">You're checked in, ${n}! See you next week.</div>`;
  } else {
    msg.innerHTML='<div class="err">That is not the word for tonight. Ask a coach.</div>';
  }
}

function coachGate(){
  app.innerHTML=`
   <button class="back" onclick="go('home')">&larr; Back</button>
   <div class="gate-title">Coach Access</div>
   <div class="gate-sub">Mentor materials for this week</div>
   <div class="card">
     <input type="password" id="cpw" placeholder="Mentor password">
     <button class="btn btn-gold" onclick="coachLogin()">Enter</button>
     <div id="cg-msg"></div>
     <div class="note">Preview password: <b>pal2017</b> &middot; The real build uses a proper login you control.</div>
   </div>`;
}
function coachLogin(){
  const pw=document.getElementById('cpw').value;
  if(pw==='pal2017'){ state.coach=true; go('coach'); }
  else document.getElementById('cg-msg').innerHTML='<div class="err">Incorrect password.</div>';
}

function coachView(){
  const l=L();
  app.innerHTML=`
   <button class="back" onclick="go('home')">&larr; Sign out</button>
   <div class="lesson-banner">
     <span class="pill">Mentor Lane</span>
     <div class="lesson-name" style="margin-top:8px">${l.name}</div>
     <div class="lesson-week">Week ${l.number} &middot; Word tonight: ${l.word}</div>
   </div>
   <div class="card"><div class="sect-label">Coaches Corner (Mentor Prep)</div>${embed(l.corner,'Coaches Corner')}</div>
   <div class="card"><div class="sect-label">Coaches Brief</div>${embed(l.coachBrief,'the Coaches Brief')}</div>
   <div class="card">
     <div class="sect-label">This Week's Documents</div>
     ${docLink(l.fileIds.workbook, 'Session Workbook')}
     ${docLink(l.fileIds.coachesCard, 'Coaches Card')}
     ${docLink(l.fileIds.infographic, 'Infographic')}
     ${docLink(l.fileIds.coachesInfographic, 'Coaches Infographic')}
   </div>
   <div class="card"><div class="sect-label">Icebreaker</div>
     ${ l.icebreaker ? `<div class="action-box">${l.icebreaker}</div>` : '<div class="missing">Add this week\'s icebreaker in the content file.</div>'}
   </div>`;
}

function go(v){ state.view=v; if(v==='home')state.coach=false; render(); }
function render(){
  if(state.view==='home') home();
  else if(state.view==='parent') parentView();
  else if(state.view==='coachgate') coachGate();
  else if(state.view==='coach') coachView();
}
render();
</script>
</body>
</html>
